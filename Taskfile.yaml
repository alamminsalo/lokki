version: '3'

env:
  AWS_ENDPOINT_URL: http://localhost:4566
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test

tasks:
  ollama-signin:
    cmds:
      - ollama signout
      - ollama signin


  dev:start:
    desc: Start LocalStack and pypiserver containers
    cmds:
      - docker compose -f dev/docker-compose.yml up

  dev:stop:
    desc: Stop LocalStack and pypiserver containers
    cmds:
      - docker compose -f dev/docker-compose.yml down

  setup-s3:
    desc: Create lokki S3 bucket in LocalStack
    cmds:
      - aws s3 mb s3://lokki

  precommit:
    desc: Run ruff, mypy, and tests
    cmds:
      - task: lint
      - task: typecheck
      - task: test

  test:
    desc: Run all unit tests
    cmds:
      - uv run pytest

  lint:
    desc: Run ruff linter
    cmds:
      - uv run ruff check lokki/

  format:
    desc: Format code with ruff
    cmds:
      - uv run ruff format lokki/

  typecheck:
    desc: Run mypy type checker
    cmds:
      - uv run mypy lokki/

  clean:
    desc: Clean build artifacts and cache
    cmds:
      - rm -rf lokki-build/ dist/ .ruff_cache .mypy_cache
      - rm -rf examples/*/lokki-build examples/*/.ruff_cache examples/*/.mypy_cache
      - rm -rf tests/flows/ci_pipeline/lokki-build tests/flows/ci_pipeline/.ruff_cache

  version:bump:
    desc: Bump minor version in pyproject.toml
    cmds:
      - uv version --bump patch

  publish:pypiserver:
    desc: Build and publish to local pypiserver (bump version first)
    deps:
      - task: version:bump
    cmds:
      - uv build
      - uv run python -m twine upload --repository-url http://localhost:8080 dist/* -u "" -p ""

  ci-pipeline:
    desc: Run full CI pipeline
    cmds:
      - task: version:bump
      - task: setup-s3
      - task: build
      - task: deploy
      - task: invoke
      - task: logs
      - task: show
      - task: destroy

  build:
    desc: Build ci_pipeline flow
    dir: tests/flows/ci_pipeline
    cmds:
      - uv sync
      - uv run python flow.py build

  deploy:
    desc: Deploy ci_pipeline to LocalStack
    dir: tests/flows/ci_pipeline
    cmds:
      - uv run python flow.py deploy --confirm

  invoke:
    desc: Invoke ci_pipeline via Step Functions
    dir: tests/flows/ci_pipeline
    cmds:
      - uv run python flow.py invoke --size 256 --multiplier 2

  logs:
    desc: Fetch CloudWatch logs from ci_pipeline
    dir: tests/flows/ci_pipeline
    cmds:
      - uv run python flow.py logs

  show:
    desc: Show Step Functions execution status
    dir: tests/flows/ci_pipeline
    cmds:
      - uv run python flow.py show

  destroy:
    desc: Destroy ci_pipeline stack
    dir: tests/flows/ci_pipeline
    cmds:
      - uv run python flow.py destroy --confirm

  docker:test:
    desc: Run Docker image integration tests
    cmds:
      - docker run -d --name lokki-registry -p 5000:5000 registry:2 || true
      - sleep 3
      - uv run pytest tests/test_docker_images.py -v
      - docker stop lokki-registry || true
      - docker rm lokki-registry || true
