name: Docker Image Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Start local registry
        run: |
          docker run -d --name lokki-registry -p 5000:5000 registry:2

      - name: Wait for registry
        run: sleep 5

      - name: Run Docker image tests
        run: |
          uv run pytest tests/test_docker_images.py -v --run-docker

      - name: Run end-to-end registry tests
        run: |
          uv run pytest tests/test_docker_images.py::TestEndToEndWithRegistry -v --run-docker

      - name: Cleanup
        if: always()
        run: |
          docker stop lokki-registry || true
          docker rm lokki-registry || true
