name: LocalStack Integration

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: us-east-1
  AWS_ENDPOINT_URL: http://localhost:4566
  RUN_LOCALSTACK_TESTS: "1"

jobs:
  localstack-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Start LocalStack
        env:
          SERVICES: s3,lambda,stepfunctions,cloudformation,ecr,iam,logs,events
          DEBUG: 1
          DEFAULT_REGION: $AWS_DEFAULT_REGION
        run: |
          docker run -d --name localstack -p 4566:4566 localstack/localstack:latest
          # Wait for LocalStack to be ready
          for i in {1..30}; do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"s3": "available"'; then
              echo "LocalStack is ready"
              break
            fi
            sleep 2
          done

      - name: Create S3 bucket
        run: |
          aws s3 mb s3://lokki

      - uses: astral-sh/setup-uv@v4

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Set up Python
        run: uv python install 3.13

      - name: Run CI flow
        run: |
          task ci-flow

      - name: Destroy
        working-directory: examples/ci_test_pipeline
        run: uv run python flow.py destroy --confirm

      - name: Run Integration Tests
        run: |
          uv sync --extra dev
          uv run pytest tests/test_localstack.py -v --tb=short
