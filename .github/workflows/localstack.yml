name: LocalStack Integration

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: us-east-1
  AWS_ENDPOINT_URL: http://localhost:4566
  RUN_LOCALSTACK_TESTS: "1"

jobs:
  localstack-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Start LocalStack
        run: |
          docker run -d --name localstack -p 4566:4566 \
            -e SERVICES=s3,lambda,stepfunctions,cloudformation,ecr,iam,logs,events \
            -e DEFAULT_REGION=$AWS_DEFAULT_REGION \
            -v /var/run/docker.sock:/var/run/docker.sock \
            localstack/localstack:latest
          # Wait for LocalStack to be ready
          for i in {1..30}; do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"s3": "available"'; then
              echo "LocalStack is ready"
              break
            fi
            sleep 2
          done

      - uses: astral-sh/setup-uv@v4

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run Unit Tests
        run: uv run pytest -v --tb=short

      - name: Run CI Pipeline
        working-directory: tests/flows/ci_pipeline
        run: |
          uv sync
          uv run python flow.py build
          uv run python flow.py deploy --confirm
          uv run python flow.py invoke --size 256 --multiplier 2

      - name: Destroy
        working-directory: tests/flows/ci_pipeline
        run: uv run python flow.py destroy --confirm
