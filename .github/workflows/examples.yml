name: Examples

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  examples:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - example: weather
            file: weather.py
            install: ""
          - example: flights
            file: flights.py
            install: "uv run playwright install"
          - example: nyc_taxi
            file: nyc_taxi.py
            install: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: examples/${{ matrix.example }}
        run: uv sync

      - name: Install extras
        if: matrix.install != ''
        run: ${{ matrix.install }}

      - name: Build
        working-directory: examples/${{ matrix.example }}
        run: uv run python ${{ matrix.file }} build

      - name: Run
        working-directory: examples/${{ matrix.example }}
        run: uv run python ${{ matrix.file }} run
